<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Svapna logomark — four states of consciousness">
  <!-- Mandukya four-states: jagrat (outer), svapna (second, emphasized), susupti, turiya (center) -->
  <g fill="none" stroke="#000" stroke-linecap="round">
    <!-- jagrat / waking -->
    <circle cx="60" cy="60" r="50" stroke-width="0.6"/>
    <!-- svapna / dream — emphasized ring -->
    <circle cx="60" cy="60" r="34" stroke-width="1.4"/>
    <!-- susupti / deep sleep -->
    <circle cx="60" cy="60" r="18" stroke-width="0.6"/>
  </g>
  <!-- svapna position marker (top of dream ring) -->
  <circle cx="60" cy="26" r="1.6" fill="#000"/>
  <!-- turiya / the fourth — solid center -->
  <circle cx="60" cy="60" r="2.4" fill="#000"/>
</svg>
