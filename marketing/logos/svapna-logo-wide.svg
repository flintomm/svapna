<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="1000" height="280" role="img" aria-label="Svapna — Dream Yoga and Lucid Dreaming">
  <style>
    .display { font-family: 'Cormorant Garamond', 'Cormorant', Garamond, Georgia, serif; }
    .mono { font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace; letter-spacing: 0.18em; }
  </style>

  <!-- Logomark: four-states rings -->
  <g transform="translate(140 140)">
    <g fill="none" stroke="#000" stroke-linecap="round">
      <circle cx="0" cy="0" r="92" stroke-width="1"/>
      <circle cx="0" cy="0" r="62" stroke-width="2.4"/>
      <circle cx="0" cy="0" r="32" stroke-width="1"/>
    </g>
    <circle cx="0" cy="-62" r="3" fill="#000"/>
    <circle cx="0" cy="0" r="4.5" fill="#000"/>
  </g>

  <!-- Hairline divider between mark and wordmark -->
  <line x1="280" y1="40" x2="280" y2="240" stroke="#000" stroke-width="0.6"/>

  <!-- Eyebrow metadata -->
  <text x="320" y="80" class="mono" font-size="13" fill="#000" letter-spacing="3.4">VOL. I &#8201;·&#8201; EST. MMXXVI</text>

  <!-- Wordmark -->
  <text x="320" y="180" class="display" font-size="108" font-weight="400" fill="#000" letter-spacing="1">Svapna</text>

  <!-- Tagline -->
  <text x="320" y="232" class="mono" font-size="12" fill="#000" letter-spacing="3.4">DREAM YOGA &#8201;·&#8201; LUCID DREAMING</text>
</svg>
